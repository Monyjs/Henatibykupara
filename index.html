<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Henati Shopping</title>
    <!-- Tailwind CSS CDN for standalone functionality -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes logo-entrance {
        0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
        100% { transform: scale(1); opacity: 1; filter: blur(0); }
      }
      
      @keyframes text-slide-up {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      
      @keyframes background-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.5; }
      }

      .animate-logo { animation: logo-entrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .animate-title { animation: text-slide-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards; opacity: 0; }
      .animate-subtitle { animation: text-slide-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards; opacity: 0; }
      
      .bg-glow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(234, 179, 8, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        filter: blur(40px);
        animation: background-pulse 4s infinite ease-in-out;
      }

      /* Custom animations for products */
      .product-card {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s ease-out;
      }
      .product-card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Toast Notification */
      #toast {
        visibility: hidden;
        min-width: 200px;
        background-color: #eab308;
        color: #000;
        text-align: center;
        border-radius: 50px;
        padding: 12px 24px;
        position: fixed;
        z-index: 100;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      #toast.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
      }
      @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
      @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

      /* Light Mode Overrides */
      body.light-mode {
        background-color: #ffffff;
        color: #18181b;
      }
      body.light-mode #splash-screen {
        background-color: #ffffff;
      }
      body.light-mode #splash-screen h1 {
        color: #18181b;
      }
      body.light-mode #main-content header .bg-zinc-800,
      body.light-mode #main-content header .w-10.h-10 {
        background-color: #f4f4f5;
        color: #18181b;
      }
      body.light-mode #main-content header span.text-2xl {
        color: #18181b;
      }
      body.light-mode .product-card {
        background-color: #ffffff;
        border-color: #e4e4e7;
      }
      body.light-mode .product-card button {
        background-color: #f4f4f5;
      }
      body.light-mode #cart-drawer,
      body.light-mode #settings-drawer {
        background-color: #ffffff;
        color: #18181b;
        border-color: #e4e4e7;
      }
      body.light-mode #cart-drawer .border-b,
      body.light-mode #cart-drawer .border-t,
      body.light-mode #settings-drawer .border-b {
        border-color: #e4e4e7;
      }
      body.light-mode .theme-card {
        background-color: #f4f4f5;
        border-color: #e4e4e7;
      }
      body.light-mode #cart-items .bg-zinc-800\/50 {
        background-color: #f4f4f5;
        border-color: #e4e4e7;
      }
      body.light-mode #exclusive-title {
        color: #18181b;
      }
    </style>
  </head>
  <body class="bg-black text-white font-sans overflow-hidden">
    <!-- Toast Notification -->
    <div id="toast">تمت الإضافة للسلة!</div>

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-black z-50 transition-opacity duration-1000">
      <div class="bg-glow"></div>
      <div class="flex flex-col items-center relative z-10">
        <div class="animate-logo">
          <img
            src="https://i.pinimg.com/736x/7b/90/45/7b904578eaa0ed24257653d8c6609b74.jpg"
            alt="Henati Logo"
            class="w-40 h-40 object-cover rounded-full mb-8 border border-yellow-500/30 shadow-[0_0_30px_rgba(234,179,8,0.1)]"
            referrerpolicy="no-referrer"
          />
        </div>
        <h1 class="text-5xl font-bold tracking-[0.2em] text-white mb-2 animate-title uppercase">
          Henati
        </h1>
        <div class="flex items-center gap-4 animate-subtitle">
          <div class="h-[1px] w-8 bg-yellow-500/50"></div>
          <p class="text-lg text-yellow-500 font-light tracking-widest">
            حنتي
          </p>
          <div class="h-[1px] w-8 bg-yellow-500/50"></div>
        </div>
      </div>
    </div>

    <!-- Settings Drawer -->
    <div id="settings-drawer" class="fixed inset-y-0 left-0 w-full sm:w-80 bg-zinc-900 z-[60] transform -translate-x-full transition-transform duration-500 shadow-2xl border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h3 class="text-xl font-bold" id="settings-title">الإعدادات</h3>
        <button onclick="toggleSettings()" class="text-zinc-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="p-6 space-y-6">
        <div class="flex items-center justify-between p-4 bg-zinc-800/50 rounded-xl border border-zinc-700 theme-card">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-languages text-yellow-500"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            <span id="lang-label" class="font-medium">اللغة / Language</span>
          </div>
          <button onclick="toggleLanguage()" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-yellow-400 transition-all active:scale-95" id="lang-btn">
            English
          </button>
        </div>

        <div class="flex items-center justify-between p-4 bg-zinc-800/50 rounded-xl border border-zinc-700 theme-card">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun text-yellow-500" id="theme-icon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <span id="theme-label" class="font-medium">المظهر / Theme</span>
          </div>
          <button onclick="toggleTheme()" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-yellow-400 transition-all active:scale-95" id="theme-btn">
            Light
          </button>
        </div>
      </div>
    </div>
    <div id="settings-overlay" onclick="toggleSettings()" class="fixed inset-0 bg-black/60 z-[55] opacity-0 pointer-events-none transition-opacity duration-500"></div>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full sm:w-80 bg-zinc-900 z-[60] transform translate-x-full transition-transform duration-500 shadow-2xl border-l border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h3 class="text-xl font-bold">سلة المشتريات</h3>
        <button onclick="toggleCart()" class="text-zinc-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
        <!-- Cart items will appear here -->
      </div>
      <div class="p-6 border-t border-zinc-800 space-y-4">
        <div class="flex justify-between items-center">
          <span class="text-zinc-400" id="cart-total-label">الإجمالي:</span>
          <span id="cart-total" class="text-yellow-500 font-bold text-xl">١٥ ريال</span>
        </div>
        <button id="checkout-btn" onclick="checkoutWhatsApp()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-yellow-400 transition-all">
          إتمام الطلب عبر واتساب
        </button>
      </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 z-[55] opacity-0 pointer-events-none transition-opacity duration-500"></div>

    <!-- Lightbox Viewer -->
    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center p-4">
      <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white bg-white/10 p-2 rounded-full hover:bg-white/20 transition-colors z-[110]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      
      <div class="relative w-full h-full flex items-center justify-center overflow-hidden cursor-grab active:cursor-grabbing" id="lightbox-container">
        <img id="lightbox-img" src="" alt="Zoomed Product" class="max-w-full max-h-full object-contain transition-transform duration-200 ease-out select-none" style="transform: scale(1) translate(0px, 0px);">
      </div>

      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 z-[110]">
        <button onclick="zoomLightbox(0.8)" class="text-white hover:text-yellow-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zoom-out"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
        </button>
        <span id="zoom-level" class="text-white font-mono text-sm min-w-[40px] text-center">100%</span>
        <button onclick="zoomLightbox(1.2)" class="text-white hover:text-yellow-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zoom-in"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
        </button>
        <div class="w-[1px] h-4 bg-white/20 mx-2"></div>
        <button onclick="resetLightbox()" class="text-white hover:text-yellow-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="opacity-0 translate-y-5 transition-all duration-1000 p-6">
      <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
          <img 
            src="https://i.pinimg.com/736x/7b/90/45/7b904578eaa0ed24257653d8c6609b74.jpg" 
            alt="Henati Logo Small" 
            class="w-10 h-10 rounded-full border border-yellow-500/30 object-cover"
            referrerpolicy="no-referrer"
          />
          <div class="flex flex-col">
            <span class="text-2xl font-bold leading-tight">Henati</span>
            <span class="text-xs text-yellow-500">حنتي</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div onclick="toggleSettings()" class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center hover:bg-zinc-700 transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="relative cursor-pointer" onclick="toggleCart()">
            <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center hover:bg-zinc-700 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-bag"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-500 text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center scale-0 transition-transform duration-300">0</span>
          </div>
        </div>
      </header>
      
      <div class="space-y-3">
        <h2 class="text-lg font-semibold" id="exclusive-title">Exclusive Collection</h2>
        <p class="text-sm text-yellow-500/90 font-medium leading-relaxed" id="store-desc">
          حنتي، وجهتك الأولى لملصقات الحنة بتصاميم أنيقة وجودة عالية
        </p>
        <p class="text-xs text-zinc-400 italic" id="price-note">Premium products at 15 SAR each.</p>
        
        <div class="grid grid-cols-2 gap-3 mt-4 pb-10" id="product-grid">
          <!-- Products will be enhanced with JS -->
        </div>
      </div>

      <footer class="mt-auto py-6 text-center">
        <p class="text-[10px] text-zinc-500 opacity-50 font-mono tracking-wider uppercase">Design by: Abdalla Hashim</p>
      </footer>
    </div>

    <script type="text/javascript">
      const translations = {
        ar: {
          settings: "الإعدادات",
          cart: "سلة المشتريات",
          total: "الإجمالي",
          checkout: "إتمام الطلب عبر واتساب",
          empty: "السلة فارغة حالياً",
          exclusive: "مجموعة حصرية",
          desc: "حنتي، وجهتك الأولى لملصقات الحنة بتصاميم أنيقة وجودة عالية",
          note: "منتجات فاخرة بسعر ١٥ ريال للقطعة",
          order: "طلب عبر واتساب",
          added: "تمت الإضافة للسلة!",
          currency: "ريال",
          langBtn: "English",
          productName: "ملصق حناء"
        },
        en: {
          settings: "Settings",
          cart: "Shopping Cart",
          total: "Total",
          checkout: "Checkout via WhatsApp",
          empty: "Your cart is empty",
          exclusive: "Exclusive Collection",
          desc: "Henati, your first destination for henna stickers with elegant designs and high quality",
          note: "Premium products at 15 SAR each",
          order: "Order via WhatsApp",
          added: "Added to cart!",
          currency: "SAR",
          langBtn: "العربية",
          productName: "Henna Sticker"
        }
      };

      const products = [
        { id: 1, nameAr: "ملصق حناء ١", nameEn: "Henna Sticker 1", price: 15, img: "https://i.pinimg.com/736x/13/75/0a/13750a0ab08cfced49a4e99a949dd608.jpg" },
        { id: 2, nameAr: "ملصق حناء ٢", nameEn: "Henna Sticker 2", price: 15, img: "https://i.pinimg.com/736x/69/3c/94/693c949dbc62f028d4416813b19ae2df.jpg" },
        { id: 3, nameAr: "ملصق حناء ٣", nameEn: "Henna Sticker 3", price: 15, img: "https://i.pinimg.com/736x/b5/48/57/b54857e8c294ac53df73ead9e519b169.jpg" },
        { id: 4, nameAr: "ملصق حناء ٤", nameEn: "Henna Sticker 4", price: 15, img: "https://i.pinimg.com/736x/f1/9b/f6/f19bf6723173b7dc72196a9c2c7c8007.jpg" },
        { id: 5, nameAr: "ملصق حناء ٥", nameEn: "Henna Sticker 5", price: 15, img: "https://i.pinimg.com/736x/28/5b/51/285b51a34214919ccdbd0eb19f3e0c51.jpg" },
        { id: 6, nameAr: "ملصق حناء ٦", nameEn: "Henna Sticker 6", price: 15, img: "https://i.pinimg.com/736x/60/2d/eb/602deb382df362a146ebfecdacb72fb8.jpg" },
        { id: 7, nameAr: "ملصق حناء ٧", nameEn: "Henna Sticker 7", price: 15, img: "https://i.pinimg.com/736x/26/4f/39/264f39bca4ce481b130335d9de0af16c.jpg" },
        { id: 8, nameAr: "ملصق حناء ٨", nameEn: "Henna Sticker 8", price: 15, img: "https://i.pinimg.com/736x/fc/bb/80/fcbb8050030cb34b85c9c61d5842e923.jpg" },
        { id: 9, nameAr: "ملصق حناء ٩", nameEn: "Henna Sticker 9", price: 15, img: "https://i.pinimg.com/736x/fb/35/af/fb35aff5a6f5c30f7369cd0ee6b4af7e.jpg" },
        { id: 10, nameAr: "ملصق حناء ١٠", nameEn: "Henna Sticker 10", price: 15, img: "https://i.pinimg.com/736x/db/a2/62/dba262053645473acd423e416d34cc43.jpg" }
      ];

      let cart = JSON.parse(localStorage.getItem('henati_cart')) || [];
      let currentLang = localStorage.getItem('henati_lang') || 'ar';
      let currentTheme = localStorage.getItem('henati_theme') || 'dark';

      function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('henati_theme', currentTheme);
        applyTheme();
      }

      function applyTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        const icon = document.getElementById('theme-icon');
        
        if (currentTheme === 'light') {
          body.classList.add('light-mode');
          btn.innerText = currentLang === 'ar' ? 'داكن' : 'Dark';
          icon.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>'; // Moon icon
        } else {
          body.classList.remove('light-mode');
          btn.innerText = currentLang === 'ar' ? 'فاتح' : 'Light';
          icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>'; // Sun icon
        }
      }

      function toggleSettings() {
        const drawer = document.getElementById('settings-drawer');
        const overlay = document.getElementById('settings-overlay');
        const isOpen = drawer.classList.contains('translate-x-0');
        
        if (isOpen) {
          drawer.classList.remove('translate-x-0');
          drawer.classList.add('-translate-x-full');
          overlay.classList.add('opacity-0', 'pointer-events-none');
        } else {
          drawer.classList.remove('-translate-x-full');
          drawer.classList.add('translate-x-0');
          overlay.classList.remove('opacity-0', 'pointer-events-none');
        }
      }

      function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('henati_lang', currentLang);
        applyLanguage();
        toggleSettings();
      }

      function checkoutWhatsApp() {
        if (cart.length === 0) return;
        
        const t = translations[currentLang];
        let message = currentLang === 'ar' ? "*طلب جديد من متجر حنتي:*\n\n" : "*New Order from Henati Store:*\n\n";
        
        cart.forEach((item, index) => {
          const name = currentLang === 'ar' ? item.nameAr : item.nameEn;
          message += `${index + 1}. ${name} (${item.quantity}x) - ${item.price * item.quantity} ${t.currency}\n`;
        });
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        message += `\n*${t.total}: ${total} ${t.currency}*`;
        
        const encodedMessage = encodeURIComponent(message);
        const whatsappUrl = `https://wa.me/966510355649?text=${encodedMessage}`;
        
        // Kodular/AppInventor Bridge
        if (window.AppInventor) {
          window.AppInventor.setWebViewString(whatsappUrl);
        } else {
          window.open(whatsappUrl, '_blank');
        }
      }

      function applyLanguage() {
        const t = translations[currentLang];
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        
        // Update Static Text
        if (document.getElementById('settings-title')) document.getElementById('settings-title').innerText = t.settings;
        if (document.querySelector('#cart-drawer h3')) document.querySelector('#cart-drawer h3').innerText = t.cart;
        if (document.getElementById('cart-total-label')) document.getElementById('cart-total-label').innerText = t.total + ':';
        if (document.getElementById('checkout-btn')) document.getElementById('checkout-btn').innerText = t.checkout;
        if (document.getElementById('exclusive-title')) document.getElementById('exclusive-title').innerText = t.exclusive;
        if (document.getElementById('store-desc')) document.getElementById('store-desc').innerText = t.desc;
        if (document.getElementById('price-note')) document.getElementById('price-note').innerText = t.note;
        if (document.getElementById('lang-btn')) document.getElementById('lang-btn').innerText = t.langBtn;
        if (document.getElementById('toast')) document.getElementById('toast').innerText = t.added;
        
        renderProducts();
        renderCartItems();
        updateCartUI();
        applyTheme(); // Refresh theme text (Light/Dark)
      }

      function toggleCart() {
        const drawer = document.getElementById('cart-drawer');
        const overlay = document.getElementById('cart-overlay');
        const isOpen = drawer.classList.contains('translate-x-0');
        
        if (isOpen) {
          drawer.classList.remove('translate-x-0');
          drawer.classList.add('translate-x-full');
          overlay.classList.add('opacity-0', 'pointer-events-none');
        } else {
          drawer.classList.remove('translate-x-full');
          drawer.classList.add('translate-x-0');
          overlay.classList.remove('opacity-0', 'pointer-events-none');
          renderCartItems();
        }
      }

      function updateCartUI() {
        const countBadge = document.getElementById('cart-count');
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        countBadge.innerText = totalCount;
        
        if (totalCount > 0) {
          countBadge.classList.remove('scale-0');
          countBadge.classList.add('scale-100');
        } else {
          countBadge.classList.remove('scale-100');
          countBadge.classList.add('scale-0');
        }
        
        localStorage.setItem('henati_cart', JSON.stringify(cart));
      }

      function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const existingItem = cart.find(item => item.id === productId);
        
        if (existingItem) {
          existingItem.quantity++;
        } else {
          cart.push({ ...product, quantity: 1 });
        }
        
        updateCartUI();
        
        // Show toast
        const toast = document.getElementById("toast");
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
      }

      function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        updateCartUI();
        renderCartItems();
      }

      function renderCartItems() {
        const container = document.getElementById('cart-items');
        const totalEl = document.getElementById('cart-total');
        const t = translations[currentLang];
        
        if (cart.length === 0) {
          container.innerHTML = `<div class="text-center text-zinc-500 py-10">${t.empty}</div>`;
          totalEl.innerText = `٠ ${t.currency}`;
          return;
        }
        
        let total = 0;
        container.innerHTML = cart.map(item => {
          total += item.price * item.quantity;
          const name = currentLang === 'ar' ? item.nameAr : item.nameEn;
          return `
            <div class="flex items-center gap-4 bg-zinc-800/50 p-3 rounded-xl border border-zinc-700">
              <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
              <div class="flex-1">
                <h4 class="font-bold text-sm">${name}</h4>
                <p class="text-yellow-500 text-xs">${item.price} ${t.currency} × ${item.quantity}</p>
              </div>
              <button onclick="removeFromCart(${item.id})" class="text-zinc-500 hover:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
              </button>
            </div>
          `;
        }).join('');
        
        totalEl.innerText = `${total} ${t.currency}`;
      }

      const productQuantities = {};

      function renderProducts() {
        const grid = document.getElementById('product-grid');
        const t = translations[currentLang];
        grid.innerHTML = '';
        products.forEach((product, index) => {
          const name = currentLang === 'ar' ? product.nameAr : product.nameEn;
          if (!productQuantities[product.id]) productQuantities[product.id] = 1;
          
          const card = document.createElement('div');
          card.className = `product-card visible bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 flex flex-col`;
          card.style.transitionDelay = `${index * 50}ms`;
          card.innerHTML = `
            <div class="relative group cursor-pointer overflow-hidden" onclick="openLightbox('${product.img}')">
              <img src="${product.img}" alt="${name}" class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-110" referrerpolicy="no-referrer">
              <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
              </div>
            </div>
            <div class="p-3 space-y-3">
              <div class="flex justify-between items-center">
                <span class="text-yellow-500 font-bold text-lg">${product.price} ${t.currency}</span>
                <button onclick="addToCart(${product.id})" class="bg-zinc-800 text-yellow-500 p-2 rounded-full hover:bg-zinc-700 transition-colors active:scale-95">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </button>
              </div>
              
              <div class="flex items-center justify-between bg-zinc-800/50 rounded-lg p-1 border border-zinc-700">
                <button onclick="changeProductQty(${product.id}, -1)" class="w-8 h-8 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minus"><path d="M5 12h14"/></svg>
                </button>
                <span id="qty-${product.id}" class="font-bold text-sm">${productQuantities[product.id]}</span>
                <button onclick="changeProductQty(${product.id}, 1)" class="w-8 h-8 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </button>
              </div>

              <button onclick="orderProductWhatsApp(${product.id})" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:bg-yellow-400 transition-all active:scale-95">
                ${t.order}
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      function changeProductQty(productId, delta) {
        productQuantities[productId] = Math.max(1, (productQuantities[productId] || 1) + delta);
        const qtyEl = document.getElementById(`qty-${productId}`);
        if (qtyEl) qtyEl.innerText = productQuantities[productId];
      }

      function orderProductWhatsApp(productId) {
        const product = products.find(p => p.id === productId);
        const qty = productQuantities[productId] || 1;
        const t = translations[currentLang];
        const name = currentLang === 'ar' ? product.nameAr : product.nameEn;
        
        let message = currentLang === 'ar' ? "*طلب منتج محدد:*\n\n" : "*Specific Product Order:*\n\n";
        message += `${name}\n`;
        message += `${currentLang === 'ar' ? 'الكمية' : 'Quantity'}: ${qty}\n`;
        message += `${currentLang === 'ar' ? 'السعر' : 'Price'}: ${product.price * qty} ${t.currency}\n\n`;
        message += `${currentLang === 'ar' ? 'صورة المنتج' : 'Product Image'}: ${product.img}`;
        
        const encodedMessage = encodeURIComponent(message);
        const whatsappUrl = `https://wa.me/966510355649?text=${encodedMessage}`;

        // Kodular/AppInventor Bridge
        if (window.AppInventor) {
          window.AppInventor.setWebViewString(whatsappUrl);
        } else {
          window.open(whatsappUrl, '_blank');
        }
      }

      // Lightbox Logic
      let zoomScale = 1;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX, startY;

      function openLightbox(imgSrc) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = imgSrc;
        lightbox.classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
        resetLightbox();
      }

      function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
      }

      function zoomLightbox(factor) {
        zoomScale = Math.max(0.5, Math.min(5, zoomScale * factor));
        updateLightboxTransform();
      }

      function resetLightbox() {
        zoomScale = 1;
        translateX = 0;
        translateY = 0;
        updateLightboxTransform();
      }

      function updateLightboxTransform() {
        const img = document.getElementById('lightbox-img');
        const zoomLabel = document.getElementById('zoom-level');
        img.style.transform = `scale(${zoomScale}) translate(${translateX / zoomScale}px, ${translateY / zoomScale}px)`;
        zoomLabel.innerText = `${Math.round(zoomScale * 100)}%`;
      }

      const container = document.getElementById('lightbox-container');
      
      container.addEventListener('mousedown', (e) => {
        if (zoomScale <= 1) return;
        isDragging = true;
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        updateLightboxTransform();
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
      });

      // Touch support for panning
      container.addEventListener('touchstart', (e) => {
        if (zoomScale <= 1) return;
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      });

      container.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateLightboxTransform();
      });

      container.addEventListener('touchend', () => {
        isDragging = false;
      });

      document.addEventListener('DOMContentLoaded', () => {
        applyLanguage();
        applyTheme();
        const splashScreen = document.getElementById('splash-screen');
        const mainContent = document.getElementById('main-content');

        setTimeout(() => {
          if (splashScreen && mainContent) {
            splashScreen.style.opacity = '0';
            setTimeout(() => {
              splashScreen.style.display = 'none';
              mainContent.classList.remove('opacity-0', 'translate-y-5');
              mainContent.classList.add('opacity-100', 'translate-y-0');
              document.body.classList.remove('overflow-hidden');
              
              // Animate products in
              document.querySelectorAll('.product-card').forEach(card => {
                card.classList.add('visible');
              });
            }, 1000);
          }
        }, 3000);
      });
    </script>
  </body>
</html>
